e</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.78125;" width="176.5625" x="175.7813" y="1120.7031"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="145.3125" x="191.4063" y="1153.7323">Fix code/config</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.78125;" width="220.3125" x="153.9063" y="1205.0293"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="189.0625" x="169.5313" y="1238.0585">Deploy to test/prod</text><rect fill="none" height="209.2285" rx="7.8125" ry="7.8125" style="stroke:#777777;stroke-width:2.34375;" width="1280.4688" x="102.3438" y="1292.4805"/><path d="M171.0938,1292.4805 L171.0938,1303.3691 L155.4688,1318.9941 L102.3438,1318.9941 " fill="none" style="stroke:#777777;stroke-width:2.34375;"/><text fill="#111111" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="53.125" x="107.0313" y="1311.4471">Verify</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.78125;" width="292.1875" x="117.9688" y="1345.5566"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="260.9375" x="133.5938" y="1378.5858">Re-scan to confirm closure</text><path d="M440.625,1437.6953 L440.625,1450.1709 L409.375,1456.4209 L440.625,1462.6709 L440.625,1475.1465 A0,0 0 0 0 440.625,1475.1465 L1367.1875,1475.1465 A0,0 0 0 0 1367.1875,1475.1465 L1367.1875,1453.3203 L1351.5625,1437.6953 L440.625,1437.6953 A0,0 0 0 0 440.625,1437.6953 " fill="#FFF8D6" style="stroke:#C7A700;stroke-width:0.78125;"/><path d="M1351.5625,1437.6953 L1351.5625,1453.3203 L1367.1875,1453.3203 L1351.5625,1437.6953 " fill="#FFF8D6" style="stroke:#C7A700;stroke-width:0.78125;"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="134.375" x="450" y="1462.912">Ke