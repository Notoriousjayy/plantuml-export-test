acing" textLength="368.75" x="122.6563" y="1547.2382">Confirm patch applied or risk reduced</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.78125;" width="334.375" x="139.8438" y="1598.5352"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="303.125" x="155.4688" y="1631.5643">Document evidence (AppCode)</text><path d="M527.3438,1690.6738 L527.3438,1703.1494 L496.0938,1709.3994 L527.3438,1715.6494 L527.3438,1728.125 A0,0 0 0 0 527.3438,1728.125 L1272.6563,1728.125 A0,0 0 0 0 1272.6563,1728.125 L1272.6563,1706.2988 L1257.0313,1690.6738 L527.3438,1690.6738 A0,0 0 0 0 527.3438,1690.6738 " fill="#FFF8D6" style="stroke:#C7A700;stroke-width:0.78125;"/><path d="M1257.0313,1690.6738 L1257.0313,1706.2988 L1272.6563,1706.2988 L1257.0313,1690.6738 " fill="#FFF8D6" style="stroke:#C7A700;stroke-width:0.78125;"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="134.375" x="536.7188" y="1715.8905">Key message:</text><text fill="#000000" font-family="Arial" font-size="18.75" font-weight="bold" lengthAdjust="spacing" textLength="231.25" x="677.3438" y="1715.8905">You still own the risk</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="334.375" x="914.8438" y="1715.8905">even when vendors own the code.</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.78125;" width="378.125" x="117.9688" y="1682.8613"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="346.875" x="133.5938" y="1715.8905">Close or renew waiver with time-box</text><ellipse cx="307.0313" cy="1803.125" fill="none" rx="17.1875" ry="17.1875" style="stroke:#222222;stroke-width:1.5625;"/><ellipse cx="307.0313" cy="1803.125" fill="#222222" rx="9.375" ry="9.375" style="stroke:#222222;stroke-width:1.5625;"/><line style="stroke:#444444;strok