<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1873.4375px" preserveAspectRatio="none" style="width:1365px;height:1873px;background:#FFFFFF;" version="1.1" viewBox="0 0 1365 1873" width="1365.625px" zoomAndPan="magnify"><title>AppSec Process 12: Non-Compliant Application Handling (Coverage, SLAs, and Exceptions)</title><defs/><g><g class="title" data-source-line="2"><text fill="#000000" font-family="Arial" font-size="25" font-weight="bold" lengthAdjust="spacing" textLength="1281.3232" x="40.5704" y="54.4556">AppSec Process 12: Non-Compliant Application Handling (Coverage, SLAs, and Exceptions)</text></g><ellipse cx="474.8329" cy="93.1641" fill="#222222" rx="15.625" ry="15.625" style="stroke:#222222;stroke-width:1.5625;"/><rect fill="none" height="380.8594" rx="7.8125" ry="7.8125" style="stroke:#777777;stroke-width:2.3438;" width="508.8104" x="220.4277" y="124.4141"/><path d="M459.0477,124.4141 L459.0477,135.3027 L443.4227,150.9277 L220.4277,150.9277" fill="none" style="stroke:#777777;stroke-width:2.3438;"/><text fill="#111111" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="222.995" x="225.1152" y="143.3807">Detect Non-Compliance</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="303.2806" x="323.1926" y="177.4902"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="272.0306" x="338.8176" y="210.5194">Trigger (audit/metrics/event)</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="461.9873" x="243.8393" y="261.8164"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="235.318" x="259.4643" y="294.8456">Identify AppCode (or flag</text><text fill="#000000" font-family="Arial" font-size="18.75" font-weight="bold" lengthAdjust="spacing" textLength="182.1442" x="500.7423" y="294.8456">missing AppCode</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="7.3151" x="682.8865" y="294.8456">)</text><rect fill="#F7F7F7" height="140.3809" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="477.5604" x="236.0527" y="346.1426"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="281.9458" x="251.6777" y="379.1718">Classify non-compliance type:</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="446.3104" x="251.6777" y="400.9979">- Missing coverage (SAST/SCA/DAST/IAST/Trivy)</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="332.3639" x="251.6777" y="422.8241">- SLA breach (critical/high overdue)</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="223.1323" x="251.6777" y="444.6503">- Repeated gate bypass</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="262.1429" x="251.6777" y="466.4764">- Vendor delay (COTS/SaaS)</text><rect fill="none" height="309.2285" rx="7.8125" ry="7.8125" style="stroke:#777777;stroke-width:2.3438;" width="550.5051" x="208.2298" y="520.8984"/><path d="M287.2917,520.8984 L287.2917,531.7871 L271.6667,547.4121 L208.2298,547.4121" fill="none" style="stroke:#777777;stroke-width:2.3438;"/><text fill="#111111" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="63.4369" x="212.9173" y="539.8651">Assess</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="478.2196" x="235.7231" y="573.9746"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="446.9696" x="251.3481" y="607.0038">Confirm scope + exposure (install model, envs)</text><polygon fill="#F7F7F7" points="351.8044,658.3008,597.8615,658.3008,616.6115,677.0508,597.8615,695.8008,351.8044,695.8008,333.0544,677.0508,351.8044,658.3008" style="stroke:#444444;stroke-width:0.7813;"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="246.0571" x="351.8044" y="683.5419">Customer/regulated data?</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="32.7576" x="300.2968" y="672.6288">Yes</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="25.4974" x="616.6115" y="672.6288">No</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="155.899" x="239.4798" y="711.4258"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="124.649" x="255.1048" y="744.455">Raise priority</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="190.4968" x="536.9881" y="711.4258"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="159.2468" x="552.6131" y="744.455">Standard priority</text><polygon fill="#F7F7F7" points="474.8329,773.877,493.5829,792.627,474.8329,811.377,456.0829,792.627,474.8329,773.877" style="stroke:#444444;stroke-width:0.7813;"/><rect fill="none" height="309.2285" rx="7.8125" ry="7.8125" style="stroke:#777777;stroke-width:2.3438;" width="908.2481" x="17.1875" y="845.752"/><path d="M176.2115,845.752 L176.2115,856.6406 L160.5865,872.2656 L17.1875,872.2656" fill="none" style="stroke:#777777;stroke-width:2.3438;"/><text fill="#111111" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="143.399" x="21.875" y="864.7186">Risk Treatment</text><polygon fill="#F7F7F7" points="364.164,898.8281,585.5019,898.8281,604.2519,917.5781,585.5019,936.3281,364.164,936.3281,345.414,917.5781,364.164,898.8281" style="stroke:#444444;stroke-width:0.7813;"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="221.3379" x="364.164" y="924.0692">Can remediate quickly?</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="32.7576" x="312.6564" y="913.1561">Yes</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="25.4974" x="604.2519" y="913.1561">No</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="418.1335" x="45.8763" y="951.9531"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="386.8835" x="61.5013" y="984.9823">Create remediation plan (owner + dates)</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="312.5183" x="538.4636" y="951.9531"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="281.2683" x="554.0886" y="984.9823">Define compensating controls</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="398.9258" x="495.2599" y="1036.2793"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="367.6758" x="510.8849" y="1069.3085">Time-boxed waiver (approval required)</text><polygon fill="#F7F7F7" points="474.8329,1098.7305,493.5829,1117.4805,474.8329,1136.2305,456.0829,1117.4805,474.8329,1098.7305" style="stroke:#444444;stroke-width:0.7813;"/><rect fill="none" height="309.2285" rx="7.8125" ry="7.8125" style="stroke:#777777;stroke-width:2.3438;" width="852.1515" x="35.9375" y="1170.6055"/><path d="M171.9543,1170.6055 L171.9543,1181.4941 L156.3293,1197.1191 L35.9375,1197.1191" fill="none" style="stroke:#777777;stroke-width:2.3438;"/><text fill="#111111" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="120.3918" x="40.625" y="1189.5721">Enforcement</text><polygon fill="#F7F7F7" points="351.9188,1223.6816,597.747,1223.6816,616.497,1242.4316,597.747,1261.1816,351.9188,1261.1816,333.1688,1242.4316,351.9188,1223.6816" style="stroke:#444444;stroke-width:0.7813;"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="245.8282" x="351.9188" y="1248.9227">Release must be blocked?</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="32.7576" x="300.4112" y="1238.0096">Yes</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="25.4974" x="616.497" y="1238.0096">No</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="404.8401" x="67.1875" y="1276.8066"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="373.5901" x="82.8125" y="1309.8358">Freeze release / block promotion&#171;gate&#187;</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="353.5614" x="503.2776" y="1276.8066"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="322.3114" x="518.9026" y="1309.8358">Allow limited release with controls</text><polygon fill="#F7F7F7" points="474.8329,1339.2578,493.5829,1358.0078,474.8329,1376.7578,456.0829,1358.0078,474.8329,1339.2578" style="stroke:#444444;stroke-width:0.7813;"/><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="351.7029" x="298.9815" y="1408.0078"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="320.4529" x="314.6065" y="1441.037">Escalate to leadership as required</text><rect fill="none" height="296.6553" rx="7.8125" ry="7.8125" style="stroke:#777777;stroke-width:2.3438;" width="1089.1251" x="260.8391" y="1495.459"/><path d="M546.7094,1495.459 L546.7094,1506.3477 L531.0844,1521.9727 L260.8391,1521.9727" fill="none" style="stroke:#777777;stroke-width:2.3438;"/><text fill="#111111" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="270.2454" x="265.5266" y="1514.4257">Verify &amp; Restore Compliance</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="319.696" x="314.9849" y="1548.5352"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="288.446" x="330.6099" y="1581.5643">Execute plan (fix/patch/config)</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="396.7377" x="276.4641" y="1632.8613"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="365.4877" x="292.0891" y="1665.8905">Re-scan/re-test (sources as applicable)</text><path d="M700.5379,1714.0869 L700.5379,1737.4756 L669.2879,1743.7256 L700.5379,1749.9756 L700.5379,1773.3643 A0,0 0 0 0 700.5379,1773.3643 L1334.3391,1773.3643 A0,0 0 0 0 1334.3391,1773.3643 L1334.3391,1729.7119 L1318.7141,1714.0869 L700.5379,1714.0869 A0,0 0 0 0 700.5379,1714.0869" fill="#FFF8D6" style="stroke:#C7A700;stroke-width:0.7813;"/><path d="M1318.7141,1714.0869 L1318.7141,1729.7119 L1334.3391,1729.7119 L1318.7141,1714.0869" fill="#FFF8D6" style="stroke:#C7A700;stroke-width:0.7813;"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="131.4697" x="709.9129" y="1739.3036">Key message:</text><text fill="#000000" font-family="Arial" font-size="18.75" font-weight="bold" lengthAdjust="spacing" textLength="457.2418" x="847.3427" y="1739.3036">Non-compliance has a predictable outcome</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="6.3171" x="1304.5845" y="1739.3036">:</text><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="404.2328" x="709.9129" y="1761.1298">remediate, mitigate-with-waiver, or freeze.</text><rect fill="#F7F7F7" height="53.0762" rx="7.8125" ry="7.8125" style="stroke:#444444;stroke-width:0.7813;" width="388.9099" x="280.378" y="1717.1875"/><text fill="#000000" font-family="Arial" font-size="18.75" lengthAdjust="spacing" textLength="357.6599" x="296.003" y="1750.2167">Update compliance status + evidence</text><ellipse cx="474.8329" cy="1840.5518" fill="none" rx="17.1875" ry="17.1875" style="stroke:#222222;stroke-width:1.5625;"/><ellipse cx="474.8329" cy="1840.5518" fill="#222222" rx="9.375" ry="9.375" style="stroke:#222222;stroke-width:1.5625;"/><line style="stroke:#444444;stroke-width:1.5625;" x1="474.8329" x2="474.8329" y1="230.5664" y2="261.8164"/><polygon fill="#444444" points="468.5829,246.1914,474.8329,261.8164,481.0829,246.1914,474.8329,252.4414" style="stroke:#444444;stroke-width:1.5625;"/><line style="stroke:#444444;stroke-width:1.5625;" x1="474.8329" x2="474.8329" y1="314.8926" y2="346.1426"/><polygon fill="#444444" points="468.5829,330.5176,474.8329,346.1426,481.0829,330.5176,474.8329,336.7676" style="stroke:#444444;stroke-width:1.5625;"/><line style="stroke:#444444;stroke-width:1.5625;" x1="474.8329" x2="474.8329" y1="108.7891" y2="177.4902"/><polygon fill="#444444" points="468.5829,161.8652,474.8329,177.4902,481.0829,161.8652,474.8329,168.1152" style="stroke:#444444;stroke-width:1.5625;"/><line style="stroke:#444444;stroke-width:1.5625;" x1="333.0544" x2="317.4294" y1="677.0508" y2="677.0508"/><line style="stroke:#444444;stroke-width:1.5625;" x1="317.4294" x2="317.4294" y1="677.0508" y2="711.4258"/><polygon fill="#444444" points="311.1794,695.8008,317.4294,711.4258,323.6794,695.8008,317.4294,702.0508" style="stroke:#444444;stroke-width:1.5625;"/><line style="stroke:#444444;stroke-width:1.5625;" x1="616.6115" x2="632.2365" y1="677.0508" y2="677.0508"/><line style="stroke:#444444;stroke-width:1.5625;" x1="632.2365" x2="6