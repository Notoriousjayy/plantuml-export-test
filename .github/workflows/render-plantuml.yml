name: Render PlantUML diagrams

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "diagrams/src/**/*.puml"
      - "diagrams/includes/**/*.puml"
      - "diagrams/config/**/*.puml"
      - ".github/actions/render-plantuml/**"
      - ".github/workflows/render-plantuml.yml"

jobs:
  render:
    runs-on: ubuntu-latest

    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true
      - name: Ensure output directories exist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagrams/out/png diagrams/out/svg diagrams/out/jpg

      - name: Link config into diagrams/src
        shell: bash
        run: |
          set -euo pipefail
          ln -sf ../config/config.puml diagrams/src/config.puml

      - name: Render diagrams (latest PlantUML)
        uses: ./.github/actions/render-plantuml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          source-dir: diagrams/src
          formats: "png svg"
          generate-jpg: "true"
          fail-on-error: "true"
          plantuml-version: "latest"

      - name: Commit rendered diagrams
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(diagrams): render PlantUML"
          file_pattern: "diagrams/out"
