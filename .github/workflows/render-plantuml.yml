name: Render PlantUML diagrams

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "diagrams/**/*.puml"
      - ".github/workflows/render-plantuml.yml"

jobs:
  render:
    runs-on: ubuntu-latest

    # Avoid infinite loops when the workflow auto-commits generated images.
    if: github.actor != 'github-actions[bot]'

    # Required for committing back to the repo with the default GITHUB_TOKEN.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Ensure output directories exist
        run: |
          mkdir -p diagrams/out/png diagrams/out/svg diagrams/out/jpg

      # IMPORTANT: export-plantuml-action runs PlantUML in a Docker container.
      # The repo is mounted at /github/workspace inside that container, so paths must use /github/workspace.
      - name: Render PNG diagrams
        uses: dreamsinbits/export-plantuml-action@v1
        with:
          args: >
            -v
            -tpng
            -o /github/workspace/diagrams/out/png
            -config /github/workspace/diagrams/config/config.puml
            /github/workspace/diagrams/src

      - name: Render SVG diagrams
        uses: dreamsinbits/export-plantuml-action@v1
        with:
          args: >
            -v
            -tsvg
            -o /github/workspace/diagrams/out/svg
            -config /github/workspace/diagrams/config/config.puml
            /github/workspace/diagrams/src

      - name: Convert PNG -> JPG (optional)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

          # Preserve folder structure under diagrams/out/png
          while IFS= read -r -d '' f; do
            rel="${f#diagrams/out/png/}"
            out="diagrams/out/jpg/${rel%.png}.jpg"
            mkdir -p "$(dirname "$out")"
            convert "$f" -quality 92 "$out"
          done < <(find diagrams/out/png -type f -name '*.png' -print0)

      - name: Commit rendered diagrams
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(diagrams): render PlantUML"
          file_pattern: "diagrams/out"
